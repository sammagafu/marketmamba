services:
  postgres:
    image: postgres:15-alpine
    container_name: forexbot-db
    environment:
      POSTGRES_DB: forexbot
      POSTGRES_USER: forexbot
      POSTGRES_PASSWORD: forexbot_password_change_me
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forexbot"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - forexbot-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: forexbot-app
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgres://forexbot:forexbot_password_change_me@postgres:5432/forexbot?sslmode=disable"
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:?Set TELEGRAM_BOT_TOKEN in .env}
      TELEGRAM_ALLOWED_USER_IDS: ${TELEGRAM_ALLOWED_USER_IDS:-}
      BROKER_PROVIDER: mock
      MAX_RISK_PER_TRADE: 0.005
      MAX_DAILY_LOSS: 0.02
      MAX_OPEN_TRADES: 2
      MAX_TRADES_PER_DAY: 10
      APP_ENV: ${APP_ENV:-production}
      PORT: 8080
      HTTP_PORT: ${HTTP_PORT:-8090}
      ENABLE_WEB: ${ENABLE_WEB:-true}
      WEB_API_KEY: ${WEB_API_KEY:?Set WEB_API_KEY in .env}
      WEB_SESSION_SECRET: ${WEB_SESSION_SECRET:?Set WEB_SESSION_SECRET in .env}
      WEB_SESSION_TTL_DAYS: ${WEB_SESSION_TTL_DAYS:-365}
      SIGNAL_BROADCAST_ENABLED: ${SIGNAL_BROADCAST_ENABLED:-true}
      SIGNAL_BROADCAST_INTERVAL_SEC: ${SIGNAL_BROADCAST_INTERVAL_SEC:-300}
      SIGNAL_BROADCAST_SYMBOL: ${SIGNAL_BROADCAST_SYMBOL:-EURUSD}
      SIGNAL_BROADCAST_SYMBOLS: ${SIGNAL_BROADCAST_SYMBOLS:-EURUSD,BTCUSD}
      SIGNAL_MIN_STRENGTH: ${SIGNAL_MIN_STRENGTH:-0.7}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-market_mamba_bot}
      TELEGRAM_BOT_CLIENT_ID: ${TELEGRAM_BOT_CLIENT_ID:-}
      TELEGRAM_LOGIN_DOMAIN: ${TELEGRAM_LOGIN_DOMAIN:-marketmamba.kkooapp.co.tz}
      PUBLIC_SITE_URL: ${PUBLIC_SITE_URL:-https://marketmamba.kkooapp.co.tz}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://marketmamba.kkooapp.co.tz}
      BROKER_ENCRYPTION_KEY: ${BROKER_ENCRYPTION_KEY:?Set BROKER_ENCRYPTION_KEY in .env}
      PUBLIC_MODE: ${PUBLIC_MODE:-true}
      SUBSCRIPTION_REQUIRED: ${SUBSCRIPTION_REQUIRED:-false}
      FREE_TRIAL_DAYS: ${FREE_TRIAL_DAYS:-30}
      TELEGRAM_ADMIN_USER_IDS: ${TELEGRAM_ADMIN_USER_IDS:?Set TELEGRAM_ADMIN_USER_IDS in .env}
      SUBSCRIPTION_CONTACT: ${SUBSCRIPTION_CONTACT:-Free testing — no payment yet.}
    # Public HTTPS via caddy; localhost:8090 for health checks / optional host nginx
    ports:
      - "127.0.0.1:8090:8090"
    expose:
      - "8090"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - forexbot-network
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    container_name: marketmamba-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    env_file:
      - .env
    environment:
      TELEGRAM_LOGIN_DOMAIN: ${TELEGRAM_LOGIN_DOMAIN:-marketmamba.kkooapp.co.tz}
      ENABLE_SSL: ${ENABLE_SSL:-true}
      APP_ENV: ${APP_ENV:-production}
      # SSL_EMAIL loaded from env_file (.env) — see scripts/caddy-entrypoint.sh
    volumes:
      - ./deploy/Caddyfile.template:/etc/caddy/Caddyfile.template:ro
      - ./scripts/caddy-entrypoint.sh:/usr/local/bin/caddy-entrypoint.sh:ro
      - caddy_data:/data
      - caddy_config:/config
    entrypoint: ["/bin/sh", "/usr/local/bin/caddy-entrypoint.sh"]
    depends_on:
      - app
    networks:
      - forexbot-network

volumes:
  postgres_data:
  caddy_data:
  caddy_config:

networks:
  forexbot-network:
    driver: bridge
